appId: space.maewa.quill
productName: Quill
directories:
  output: release
  buildResources: build
files:
  - "out/**/*"
  - "package.json"
extraResources:
  - from: "src/shared/templates"
    to: "templates"
    filter:
      - "*.md"
asar: true
mac:
  category: public.app-category.productivity
  target:
    - dmg
  icon: build/icon.icns
  identity: null
  hardenedRuntime: true
  gatekeeperAssess: false
  extendInfo:
    NSMicrophoneUsageDescription: "During your meetings, Quill transcribes your microphone."
    NSScreenCaptureUsageDescription: "During your meetings, Quill uses screen capture to transcribe system audio. The screen video is discarded; only the audio track is used."
    NSAudioCaptureUsageDescription: "During your meetings, Quill transcribes your computer's audio output."
    NSCalendarsUsageDescription: "Quill shows your upcoming meetings."
dmg:
  icon: build/icon.icns
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
